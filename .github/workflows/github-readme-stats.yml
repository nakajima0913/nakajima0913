name: Update GitHub Readme Stats

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6(fixed by pinact)

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@8614f3a61601854731381d853f8566867754a5ca # v2(fixed by pinact)
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&include_all_commits=true&count_private=true
          path: profile/stats.svg
          token: ${{ secrets.GRS_PAT }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update GitHub Readme Stats cards" || exit 0
          git push